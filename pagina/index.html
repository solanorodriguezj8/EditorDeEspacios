<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Configurador de Materiales</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <!-- Imagen base -->

    <div class="room">
        <img src="baño2/baño2-base.jpg" class="base">

    <!-- CAPA CON MÁSCARA (pared) -->
        <div class="mask pared-frontal" id="pared-frontal"></div>
        <div class="mask pared-lateral" id="pared-lateral">
            <div class="texturaLateral"></div>
        </div>
        <div class="mask suelo" id="suelo">
            <div class="texturaSuelo"></div>
        </div>
    </div>

    <!-- Panel de materiales -->

    <div class="panel">
        <h3>Materiales pared</h3>
        <button onclick="CargarMateriales('pared', 'pared-frontal-list', 'pared-frontal')">Ver materiales</button>
        <h3>Materiales pared lateral</h3>
        <button onclick="CargarMateriales('pared','pared-lateral-list', 'pared-lateral')">Ver materiales</button>
        <h3>Materiales suelo</h3>
        <button onclick="CargarMateriales('suelo','suelo-list', 'suelo')">Ver materiales</button>

        <div id="popup" class="popup hidden">
            <div class="popup-content" id="popup-content"></div>
        </div>
    </div>
</div>

<script>
    //Hacemos que si clica fuera del popup se cierre
    document.getElementById("popup").addEventListener("click", function(e) {
        if (e.target === this) {
            this.classList.add("hidden");
        }
    });
    async function CargarMateriales(zona, zonaIMGList, zonaIMG) {
        //Declaramos y cogemos donde se cargan los materiales
        const popup = document.getElementById('popup');
        const contenedor = document.getElementById("popup-content");

        popup.classList.remove("hidden");
        contenedor.innerHTML = "Cargando...";
        
        const res = await fetch("productos.json");
        const materiales = await res.json();
        contenedor.innerHTML="";
        //Hacemos un bucle iterable para pasar por todos los productos
        materiales.forEach(material => {
            //Comprobamos primero si podemos ponerlo en la zona indicada
            if(material.aplicacion.includes(zona)){
                //Creamos el elemento de imagen y le añadimos todos los campos
                const img = document.createElement("img");
                img.src = material.muestra;
                img.title = material.nombre;
                
                //Añadimos un poco de style
                img.style.width = "80px";
                img.style.height = "80px";
                img.style.cursor = "pointer";
                img.style.margin = "5px";

                img.onclick = () =>{ 
                    aplicarMaterial(zonaIMG, material);
                    popup.classList.add("hidden");
                }
                contenedor.appendChild(img);
            }
        });
    }

    //Declaramos la funcion para aplicar el material, la cual recibe que se cambia y con que material
    function aplicarMaterial(zonaCambiar,material){
        //Declaramos una variable la cual almacenara las capas del material
        const capas = [material.material];
        //Cogemos el elemento, que es la zona a cambiar
        let elemento;
        if(zonaCambiar === "suelo"){
            elemento = document.querySelector("#suelo .texturaSuelo");
        }else if(zonaCambiar === "pared-lateral"){
            elemento = document.querySelector("#pared-lateral .texturaLateral");
        }else{
            elemento = document.getElementById(zonaCambiar);
        }
        
        //Declaramos una funcion para numeros random
        function rand(min,max){return Math.random() * (max-min)+min};

        //Generamos todo dinamicamente con map para evitar problemas
        const imagenes = capas.map(c=> `url(${c})`).join(', ');
        const tam = capas.map(() => `${rand(200,250)}`).join(', ');
        const repetir = capas.map(()=> `repeat`).join(', ');
        const positions = capas.map(() =>
            `${rand(0,500)}px ${rand(0,500)}px`).join(', ');

        //Asignamos todo al elemento
        elemento.style.backgroundImage = imagenes;
        elemento.style.backgroundSize = tam;
        elemento.style.backgroundRepeat = repetir;
        elemento.style.backgroundBlendMode = 'normal';
        elemento.style.backgroundPosition = positions;
    }

</script>

</body>
</html>
