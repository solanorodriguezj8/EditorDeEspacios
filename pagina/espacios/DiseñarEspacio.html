<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Configurador de Materiales</title>
  <link rel="stylesheet" href="../stylesEspacios.css">
</head>
<body>

<div class="container">

    <!-- Imagen base -->

    <div class="room" id = "room">
    </div>

     <!--Panel de materiales -->

    <div class="panel" id="panel">
        <div id="popup" class="popup hidden">
            <div class="popup-content" id="popup-content"></div>
        </div>
    </div>
</div>
    
<script>
// ==========================
// CONFIGURADOR DINÁMICO
// ==========================

const room = document.getElementById("room");

// leer parámetro de la URL
const params = new URLSearchParams(window.location.search);
const espacioID = params.get("espacio");
//Variable que almacena el material con el que viene la imagen, para cuando se intente aplicar no se aplique nada 
const materialesPDefecto = {};

// cargar espacio desde JSON
async function cargarEspacio(){
    const res = await fetch("./espacios.json");
    const data = await res.json();

    const panel = document.getElementById("panel");
    const espacio = data.espacios.find(e => e.id === espacioID);

    if(!espacio){
        console.error("Espacio no encontrado");
        return;
    }

    // imagen base
    const img = document.createElement("img");
    img.src = espacio.imagen;
    img.classList.add("base");
    room.appendChild(img);

    // zonas dinámicas
    Object.entries(espacio.zonas).forEach(([id, zona]) => {

        const div = document.createElement("div");
        div.id = id;
        div.classList.add("mask");

        div.style.maskImage = `url(${zona.mask})`;
        div.style.webkitMaskImage = `url(${zona.mask})`;
        
        //A partir de aqui vamos a generar en el panel lo que necesita o tiene la imagen para editarla
        //Creamos un h3 para indicar de que zona es
        const titulo = document.createElement('h3');
        

        // añadir textura si hace falta
        if(zona.tipo === "suelo"){
            const tex = document.createElement("div");
            tex.classList.add("texturaSuelo");
            div.appendChild(tex);
            titulo.textContent = "Materiales suelo";
        }else if(zona.tipo === "pared-lateral"){
            const tex = document.createElement("div");
            tex.classList.add("texturaLateral");
            div.appendChild(tex);
            titulo.textContent = "Materiales pared lateral"
        }else{
            titulo.textContent = ("Materiales " + zona.tipo); 
        }
        materialesPDefecto[id] = zona.material;


        //Creamos el boton para ver los materiales
        const btn = document.createElement('button');
        btn.onclick = () =>{
            CargarMateriales(zona.zona,id);
        };
        btn.textContent = "Ver materiales"
        //Lo añadimos al panel
        panel.appendChild(titulo);
        panel.appendChild(btn)

        //Creamos y agregamos un div, el cual sirve para poder tener info del material aplicado
        const infoDiv = document.createElement("div");
        infoDiv.id = `info-${id}`;
        infoDiv.classList.add("info-material");
        //Rellenamos con un contenido inicial por defecto
        infoDiv.innerHTML = `<img src="${zona.muestraMat}">
                            <div>
                                <strong><p>Nombre: ${zona.material}</p>
                                <p>Serie: ${zona.serieMat}</p>
                                <a href="${zona.infoMat}">Más información</a></strong>
                            </div>`
        panel.appendChild(infoDiv);

        room.appendChild(div);
    });
}

cargarEspacio();


// ==========================
// POPUP MATERIALES
// ==========================

// cerrar popup al clicar fuera
document.getElementById("popup").addEventListener("click", function(e) {
    if (e.target === this) {
        this.classList.add("hidden");
    }
});

async function CargarMateriales(zona, zonaIMG) {

    const popup = document.getElementById('popup');
    const contenedor = document.getElementById("popup-content");

    popup.classList.remove("hidden");
    contenedor.innerHTML = "Cargando...";
    
    const res = await fetch("productos.json");
    let materiales = await res.json();

    contenedor.innerHTML = "";

    // agrupar por serie
    const agrupados = materiales.reduce((acc,material)=>{
        if(!acc[material.serie]) acc[material.serie] = [];
        acc[material.serie].push(material);
        return acc;
    },{});

    Object.entries(agrupados).forEach(([serie, productos]) => {

        if(productos.some(material=>material.aplicacion.includes(zona))){
            const titulo = document.createElement('h3');
            titulo.textContent = serie;
            titulo.style.borderBottom = "2px solid #ddd";
            titulo.style.marginRight = "100%";
            contenedor.appendChild(titulo);
        }

        productos.forEach(material => {
            if (material.aplicacion.includes(zona)) {

                const img = document.createElement("img");
                img.src = material.muestra;
                img.title = material.nombre;

                img.style.width = "80px";
                img.style.height = "80px";
                img.style.cursor = "pointer";
                img.style.margin = "5px";

                img.onclick = () =>{ 
                    aplicarMaterial(zonaIMG, material);
                    popup.classList.add("hidden");
                }

                contenedor.appendChild(img);
            }
        });
    });
}


// ==========================
// APLICAR MATERIAL
// ==========================

function aplicarMaterial(zonaCambiar, material){
    let elemento;

    if(zonaCambiar === "suelo"){
        elemento = document.querySelector("#suelo .texturaSuelo");
    }else if(zonaCambiar === "pared-lateral"){
        elemento = document.querySelector("#pared-lateral .texturaLateral");
    }else{
        elemento = document.getElementById(zonaCambiar);
    }

    if(materialesPDefecto[zonaCambiar] != material.nombre){

        const capas = [material.material];

        function rand(min,max){return Math.random() * (max-min)+min};

        const imagenes = capas.map(c=> `url(${c})`).join(', ');
        const tam = capas.map(() => `${rand(200,250)}px`).join(', ');
        const repetir = capas.map(()=> `repeat`).join(', ');
        const positions = capas.map(() =>
            `${rand(0,500)}px ${rand(0,500)}px`).join(', ');

        elemento.style.backgroundImage = imagenes;
        elemento.style.opacity = 1;
        elemento.style.backgroundSize = tam;
        elemento.style.backgroundRepeat = repetir;
        elemento.style.backgroundPosition = positions;

    } else {
        elemento.style.opacity = 0;
    }
    //Llamamos al actualizar la info del panel
    actualizarInfoPanel(zonaCambiar,material)

}

function actualizarInfoPanel(zona,material){
    const contenedor = document.getElementById(`info-${zona}`);

    contenedor.innerHTML = `<img src="${material.muestra}">
                            <div>
                                <strong><p>Nombre: ${material.nombre}</p>
                                <p>Serie: ${material.serie}</p>
                                <a href="${material.enlace}">Más información</a></strong>
                            </div>`

}
</script>
</body>
</html>
